<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pase confirmado</title>
  <style>
  body {
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(180deg, #9ba282, #eef0e7);
    color: #26331f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 22px;
  }

  .card {
    position: relative;
    background: #fffdf7;
    max-width: 430px;
    width: 100%;
    text-align: center;
    border-radius: 28px;
    padding: 42px 28px 34px;
    box-shadow: 0 18px 45px rgba(38, 51, 31, 0.22);
    border: 1px solid #d8caa3;
    overflow: hidden;
  }

  .card::before {
    content: "✦ ❦ ✦";
    display: block;
    color: #d9c49a;
    font-size: 24px;
    margin-bottom: 10px;
    letter-spacing: 8px;
  }

  h1 {
    margin: 0;
    font-size: 38px;
    color: #26331f;
    letter-spacing: 0.5px;
  }

  .thanks {
    font-size: 22px;
    margin: 8px 0 28px;
    color: #bfa66f;
  }

  .info {
    font-size: 18px;
    line-height: 1.65;
    margin-bottom: 24px;
  }

  .info strong {
    color: #26331f;
  }

  .qr {
    margin: 18px auto;
    width: 235px;
    height: 235px;
    padding: 12px;
    background: white;
    border: 1px solid #d8caa3;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(38, 51, 31, 0.12);
  }

  .footer {
    font-size: 15px;
    margin-top: 22px;
    color: #3f4a32;
  }

  #whatsappBtn button {
    margin-top: 16px;
    padding: 12px 18px;
    border-radius: 14px;
    border: none;
    background: #3f4a32;
    color: #fffdf7;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;
  }

  .code {
    font-size: 13px;
    margin-top: 16px;
    color: #8b7a4e;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>Aldo y Katia</h1>
    <div class="thanks">Gracias✨</div>

    <div class="info">
      Invitado: <strong id="familia"></strong><br>
      Su asistencia ha sido confirmada.<br>
      Pases reservados: <strong id="personas"></strong><br>
      Pases confirmados: <strong id="confirmados"></strong>
    </div>

    <img class="qr" id="qr" alt="Código QR" />

    <div class="footer">
      Presente este código el día del evento.
    </div>

    <a id="whatsappBtn" target="_blank">
  <button style="margin-top:15px; padding:10px 15px; border-radius:8px; border:none; background:#3f4a32; color:white;">
    Enviar mi pase por WhatsApp
  </button>
</a>
    
    <div class="code" id="codigo"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const familia = params.get("familia") || "Invitado";
    const personas = params.get("personas") || "0";
    const confirmados = params.get("confirmados") || "0";
    const codigo = params.get("codigo") || "SIN-CODIGO";

    document.getElementById("familia").textContent = familia;
    document.getElementById("personas").textContent = personas;
    document.getElementById("confirmados").textContent = confirmados;
    document.getElementById("codigo").textContent = codigo;

    const qrText = `${codigo} | ${familia} | ${confirmados} pases`;
    
    const mensaje = `Aldo y Katia
Gracias✨

Invitado: ${familia}
Pases confirmados: ${confirmados}

Tu pase:
${window.location.href}`;

const waLink = "https://wa.me/?text=" + encodeURIComponent(mensaje);

document.getElementById("whatsappBtn").href = waLink;
    
    const qrUrl =
      "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
      encodeURIComponent(qrText);

    document.getElementById("qr").src = qrUrl;
  </script>

</body>
</html>
